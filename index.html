<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Poster Generator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main id="stage" aria-label="Generated poster"></main>
    <button id="refresh" type="button" title="New design" aria-label="New design">
      <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
        <path
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
          d="M20 11a8 8 0 1 0-.6 3M20 4v6h-6"
        />
      </svg>
    </button>
    <script src="main.js"></script>
  </body>
</html>
